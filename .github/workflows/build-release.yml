name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS artifacts
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rxfhir-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows artifacts
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rxfhir-windows
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CHANGELOG_FILE="changelog/${TAG_NAME}.md"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "::error file=${CHANGELOG_FILE}::Missing per-version changelog file."
            echo "Create ${CHANGELOG_FILE} before pushing the release tag."
            exit 1
          fi

          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "CHANGELOG_FILE=${CHANGELOG_FILE}" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=RxFHIR ${TAG_NAME#v}" >> "$GITHUB_ENV"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: rxfhir-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: rxfhir-windows
          path: release-assets/windows

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/macos/* release-assets/windows/* --clobber
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file "$CHANGELOG_FILE"
          else
            gh release create "$TAG_NAME" \
              release-assets/macos/* \
              release-assets/windows/* \
              --title "$RELEASE_TITLE" \
              --notes-file "$CHANGELOG_FILE" \
              --verify-tag
          fi
