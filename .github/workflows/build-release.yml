name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build macOS artifacts
        run: |
          npm run build
          npx electron-builder --mac dmg zip --x64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rxfhir-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows artifacts
        run: |
          npm run build
          npx electron-builder --win nsis portable --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rxfhir-windows
          path: |
            dist/*Setup*.exe
            dist/*Portable*.exe
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Typecheck
        run: npm run typecheck

      - name: Build Linux artifacts
        run: |
          npm run build
          npx electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rxfhir-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve release metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CHANGELOG_FILE="changelog/${TAG_NAME}.md"
          RELEASE_NOTES_FILE="${RUNNER_TEMP}/${TAG_NAME}-release-notes.md"

          if ! git cat-file -e "${GITHUB_SHA}:${CHANGELOG_FILE}" 2>/dev/null; then
            echo "::error file=${CHANGELOG_FILE}::Missing per-version changelog file in tagged commit ${GITHUB_SHA}."
            echo "Create ${CHANGELOG_FILE} before pushing the release tag."
            exit 1
          fi

          cat > "$RELEASE_NOTES_FILE" <<'EOF'
          ## Download Guide

          - Windows: Download `RxFHIR-Windows-Setup-...exe` or `RxFHIR-Windows-Portable-...exe`
          - macOS: Download `RxFHIR-macOS-...dmg`
          - Linux: Download `RxFHIR-Linux-...AppImage` or `RxFHIR-Linux-...deb`
          - Do not download `Source code (zip)` or `Source code (tar.gz)` if you want the runnable desktop app

          ---

          EOF

          git show "${GITHUB_SHA}:${CHANGELOG_FILE}" >> "$RELEASE_NOTES_FILE"

          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "CHANGELOG_FILE=${CHANGELOG_FILE}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_FILE=${RELEASE_NOTES_FILE}" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=RxFHIR ${TAG_NAME#v}" >> "$GITHUB_ENV"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v7
        with:
          name: rxfhir-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: rxfhir-windows
          path: release-assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v7
        with:
          name: rxfhir-linux
          path: release-assets/linux

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/macos/* release-assets/windows/* release-assets/linux/* --clobber
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG_NAME" \
              release-assets/macos/* \
              release-assets/windows/* \
              release-assets/linux/* \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --verify-tag
          fi
