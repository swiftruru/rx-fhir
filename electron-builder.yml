appId: com.rxfhir.app
productName: RxFHIR
copyright: Copyright © 2025 RxFHIR

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

extraResources:
  - from: build/icon.png
    to: icon.png

mac:
  category: public.app-category.healthcare-fitness
  artifactName: ${productName}-macOS-${version}.${ext}
  icon: build/icon.icns
  target:
    - dmg
    - zip

win:
  icon: build/icon.png
  target:
    - nsis
    - portable

linux:
  artifactName: ${productName}-Linux-${version}.${ext}
  category: Utility
  maintainer: Yu-Ru Pan <ruru@swift.moe>
  icon: build/icon.png
  target:
    - AppImage
    - deb

nsis:
  artifactName: ${productName}-Windows-Setup-${version}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

portable:
  artifactName: ${productName}-Windows-Portable-${version}.${ext}
